<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韓国語動画スクリプトジェネレーター</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #f5f4f0; min-height: 100vh; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const GENRES = ["間違いやすい表現","ニュアンス差","スラング","慣用句","日韓比較"];
const STEP_KEYS = ["hook","misdirect","reveal","example","hookout"];
const STEP_LABELS = {hook:"フック",misdirect:"ミスリード",reveal:"正解・解説",example:"例文",hookout:"余韻・補足"};
const STEP_HINTS = {hook:"問いかけで引き込む",misdirect:"既存知識とのギャップ",reveal:"韓国語＋読み仮名＋意訳",example:"自然な会話場面",hookout:"関連知識かオチ"};

const SYS_SCRIPT = `あなたは韓国語学習TikTok動画のスクリプトライターです。AとBの2人が会話形式で進める15〜26秒の動画スクリプトをJSONで生成してください。

フォーマット:
{"genre":"ジャンル","theme":"テーマ","steps":{"hook":{"A":"Aのセリフ","B":"Bのセリフ"},"misdirect":{"A":"Aのセリフ","B":"Bのセリフ"},"reveal":{"A":"Aのセリフ","B":"Bのセリフ"},"example":{"A":"Aのセリフ","B":"Bのセリフ"},"hookout":{"A":"Aのセリフ","B":"Bのセリフ"}}}

ルール:
- 難易度: 中級固定（TOPIK3〜4）
- 基本言語は日本語。韓国語は今回学ぶ表現のみハングルで提示
- 口調: フレンドリー・タメ口（〜だよね／〜かな）
- 韓国語には必ず[]で読み仮名を添える
- hookはAが問いかけ、Bが反応する形
- revealはAが正解を提示、Bが感想・補足
- JSONのみ返す。前置き不要。`;

async function callClaude(sys, user, tools) {
  const body = { model: "claude-sonnet-4-20250514", max_tokens: 1500, system: sys, messages: [{ role: "user", content: user }] };
  if (tools) body.tools = tools;
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  const d = await res.json();
  if (d.error) throw new Error(d.error.message);
  return d.content.filter(b => b.type === "text").map(b => b.text).join("\n");
}

function parseJSON(raw) {
  return JSON.parse(raw.replace(/```json|```/g, "").trim());
}

const c = {
  wrap: { maxWidth: 640, margin: "0 auto", padding: "1.5rem 1rem", fontFamily: "-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif", color: "#1a1a18" },
  card: { background: "#fff", border: "1px solid #e8e8e3", borderRadius: 14, padding: "1.25rem", marginBottom: "1rem" },
  lbl: { fontSize: 11, color: "#888", fontWeight: 600, textTransform: "uppercase", letterSpacing: ".5px", display: "block", marginBottom: 5 },
  inp: { width: "100%", border: "1px solid #e0e0da", borderRadius: 8, padding: "9px 12px", fontSize: 14, background: "#fafaf7", color: "#1a1a18", outline: "none", boxSizing: "border-box", marginBottom: 10, fontFamily: "inherit" },
  bp: { background: "#1a1a18", color: "#fff", border: "none", borderRadius: 8, padding: "9px 18px", fontSize: 14, fontWeight: 500, cursor: "pointer" },
  bo: { background: "#fff", color: "#1a1a18", border: "1px solid #d0d0ca", borderRadius: 8, padding: "9px 18px", fontSize: 14, fontWeight: 500, cursor: "pointer" },
  bgrp: { display: "flex", gap: 8, flexWrap: "wrap", marginTop: "1rem" },
  pill: (active, done) => ({ fontSize: 12, padding: "4px 12px", borderRadius: 20, border: "1px solid", borderColor: active ? "#1a1a18" : done ? "#c0dd97" : "#ddddd8", background: active ? "#1a1a18" : done ? "#e8f5e0" : "#fff", color: active ? "#fff" : done ? "#3b6d11" : "#9b9b96" }),
  gtag: (sel) => ({ padding: "7px 14px", borderRadius: 20, border: "1px solid", borderColor: sel ? "#1a1a18" : "#d0d0ca", background: sel ? "#1a1a18" : "#fff", color: sel ? "#fff" : "#1a1a18", fontSize: 13, cursor: "pointer" }),
  titem: (sel) => ({ padding: "12px 14px", border: sel ? "2px solid #1a1a18" : "1px solid #e8e8e3", borderRadius: 10, marginBottom: 8, cursor: "pointer", background: sel ? "#fafaf7" : "#fff" }),
  err: { fontSize: 13, color: "#a32d2d", marginTop: 8, padding: "8px 12px", background: "#fcebeb", borderRadius: 6 },
  irow: { display: "flex", justifyContent: "space-between", padding: "8px 0", borderBottom: "1px solid #f0efe8", fontSize: 13 },
  aTag: (who) => ({ display: "inline-block", fontSize: 11, fontWeight: 700, padding: "2px 8px", borderRadius: 10, marginBottom: 4, background: who === "A" ? "#e6f1fb" : "#faeeda", color: who === "A" ? "#185fa5" : "#854f0b" }),
};

function App() {
  const [step, setStep] = useState(0);
  const [ckey, setCkey] = useState("");
  const [hkey, setHkey] = useState("");
  const [keyErr, setKeyErr] = useState("");
  const [verifying, setVerifying] = useState(false);
  const [genre, setGenre] = useState("");
  const [themes, setThemes] = useState([]);
  const [loadingThemes, setLoadingThemes] = useState(false);
  const [themeStatus, setThemeStatus] = useState("");
  const [selTheme, setSelTheme] = useState(null);
  const [script, setScript] = useState(null);
  const [loadingScript, setLoadingScript] = useState(false);
  const [sending, setSending] = useState(false);
  const [sendErr, setSendErr] = useState("");
  const [result, setResult] = useState(null);

  const verifyKeys = async () => {
    setKeyErr("");
    if (!ckey.startsWith("sk-ant-")) { setKeyErr("Claude APIキーの形式が正しくありません"); return; }
    if (!hkey) { setKeyErr("HeyGen APIキーを入力してください"); return; }
    setVerifying(true);
    try { await callClaude("hi", "hi"); setStep(1); }
    catch(e) { setKeyErr("確認失敗: " + e.message); }
    finally { setVerifying(false); }
  };

  const fetchThemes = async () => {
    setLoadingThemes(true); setThemes([]); setSelTheme(null);
    setThemeStatus("Web検索で最新情報を収集中...");
    try {
      const sys = `あなたは韓国語学習コンテンツのテーマリサーチャーです。Web検索ツールを使って以下を調べてから、テーマ候補を5つ生成してください。検索内容: 最近のKドラ・K-POPで実際に使われている表現 / 日本人が間違えやすい韓国語 / ネイティブが日常的に使うスラング・口語 / 日本語と意味が異なる韓国語。ジャンル: ${genre}。JSONのみ: {"themes":[{"phrase":"ハングル","description":"なぜ面白いか","source":"参考情報源"}]}。ありきたりでない、「へー！」と思わせるものを選ぶこと。`;
      const raw = await callClaude(sys, "テーマ候補を生成してください。", [{ type: "web_search_20250305", name: "web_search" }]);
      setThemeStatus("");
      const parsed = parseJSON(raw);
      setThemes(parsed.themes);
    } catch(e) { setThemeStatus(""); console.error(e); }
    finally { setLoadingThemes(false); }
  };

  const generateScript = async () => {
    setLoadingScript(true);
    try {
      const user = "ジャンル「" + genre + "」テーマ「" + selTheme.phrase + "（" + selTheme.description + "）」でA・B2人の会話スクリプトを生成してください。";
      const raw = await callClaude(SYS_SCRIPT, user);
      setScript(parseJSON(raw)); setStep(2);
    } catch(e) { console.error(e); }
    finally { setLoadingScript(false); }
  };

  const updateLine = (stepKey, who, val) => {
    setScript(prev => ({ ...prev, steps: { ...prev.steps, [stepKey]: { ...prev.steps[stepKey], [who]: val } } }));
  };

  const sendToHeygen = async () => {
    setSending(true); setSendErr("");
    try {
      const ar = await fetch("https://api.heygen.com/v2/avatars", { headers: { "x-api-key": hkey } });
      const ad = await ar.json();
      const avatars = (ad && ad.data && ad.data.avatars) || [];
      if (!avatars.length) throw new Error("アバターが見つかりません");
      const av = avatars[Math.floor(Math.random() * avatars.length)];
      const txt = STEP_KEYS.map(k => { const st = script.steps[k]; return (st.A||"")+" "+(st.B||""); }).join(" ");
      const vr = await fetch("https://api.heygen.com/v2/video/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-api-key": hkey },
        body: JSON.stringify({ test: true, caption: false, dimension: { width: 1080, height: 1920 }, video_inputs: [{ character: { type: "avatar", avatar_id: av.avatar_id, avatar_style: "normal" }, voice: { type: "text", input_text: txt, voice_id: "ja-JP-NanamiNeural" } }] })
      });
      const vd = await vr.json();
      if (vd.error) throw new Error(vd.error.message || JSON.stringify(vd.error));
      setResult({ videoId: vd.data && vd.data.video_id, avatarName: av.avatar_name }); setStep(3);
    } catch(e) { setSendErr(e.message); }
    finally { setSending(false); }
  };

  const resetAll = () => { setScript(null); setSelTheme(null); setThemes([]); setResult(null); setSendErr(""); setThemeStatus(""); setStep(1); };

  return (
    <div style={c.wrap}>
      <h2 style={{ fontSize: 18, fontWeight: 600, marginBottom: 4 }}>韓国語動画スクリプトジェネレーター</h2>
      <p style={{ fontSize: 13, color: "#888", marginBottom: "1.5rem" }}>テーマ選択 → スクリプト生成 → 確認・修正 → HeyGen送信</p>
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: "1.5rem" }}>
        {["設定","テーマ選択","確認・修正","HeyGen送信"].map((l,i) => <div key={i} style={c.pill(i===step,i<step)}>{i+1}. {l}</div>)}
      </div>

      {step === 0 && (
        <div style={c.card}>
          <p style={{ fontSize: 13, color: "#888", marginBottom: 14, lineHeight: 1.6 }}>APIキーはブラウザ内のみで処理されます。</p>
          <span style={c.lbl}>Claude APIキー</span>
          <input style={c.inp} type="password" placeholder="sk-ant-..." value={ckey} onChange={e => setCkey(e.target.value)} />
          <span style={c.lbl}>HeyGen APIキー</span>
          <input style={{ ...c.inp, marginBottom: 14 }} type="password" placeholder="sk_V2_..." value={hkey} onChange={e => setHkey(e.target.value)} />
          {keyErr && <div style={c.err}>{keyErr}</div>}
          <div style={c.bgrp}>
            <button style={{ ...c.bp, opacity: verifying ? 0.5 : 1 }} onClick={verifyKeys} disabled={verifying}>
              {verifying ? "確認中..." : "キーを確認して次へ →"}
            </button>
          </div>
        </div>
      )}

      {step === 1 && (
        <div>
          <div style={c.card}>
            <span style={c.lbl}>ジャンルを選ぶ</span>
            <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 14 }}>
              {GENRES.map(g => <button key={g} style={c.gtag(genre===g)} onClick={() => setGenre(g)}>{g}</button>)}
            </div>
            <button style={{ ...c.bp, opacity: (!genre||loadingThemes) ? 0.5 : 1 }} onClick={fetchThemes} disabled={!genre||loadingThemes}>
              {loadingThemes ? "検索・生成中..." : "テーマ候補を出す"}
            </button>
            {themeStatus && <p style={{ fontSize: 12, color: "#888", marginTop: 8 }}>{themeStatus}</p>}
          </div>
          {themes.length > 0 && (
            <div style={c.card}>
              <span style={c.lbl}>テーマを選ぶ</span>
              <div style={{ marginBottom: 12 }}>
                {themes.map((t,i) => (
                  <div key={i} style={c.titem(selTheme===t)} onClick={() => setSelTheme(t)}>
                    <div style={{ fontSize: 16, fontWeight: 600 }}>{t.phrase}</div>
                    <div style={{ fontSize: 13, color: "#444", marginTop: 2 }}>{t.description}</div>
                    {t.source && <div style={{ fontSize: 11, color: "#aaa", marginTop: 4 }}>参考: {t.source}</div>}
                  </div>
                ))}
              </div>
              <div style={c.bgrp}>
                <button style={{ ...c.bp, opacity: (!selTheme||loadingScript) ? 0.5 : 1 }} onClick={generateScript} disabled={!selTheme||loadingScript}>
                  {loadingScript ? "生成中..." : "スクリプトを生成する →"}
                </button>
                <button style={c.bo} onClick={fetchThemes}>候補を出し直す</button>
              </div>
            </div>
          )}
        </div>
      )}

      {step === 2 && script && (
        <div>
          <div style={{ marginBottom: 10 }}>
            {[["ジャンル",script.genre],["テーマ",script.theme]].map(([k,v]) => (
              <span key={k} style={{ fontSize: 12, padding: "4px 10px", borderRadius: 6, background: "#f0efe8", color: "#5f5e5a", border: "1px solid #e0e0da", display: "inline-block", marginRight: 6, marginBottom: 6 }}>
                {k} <strong style={{ color: "#1a1a18" }}>{v}</strong>
              </span>
            ))}
          </div>
          {STEP_KEYS.map((key,i) => (
            <div key={key} style={c.card}>
              <div style={{ display: "flex", alignItems: "center", marginBottom: 12 }}>
                <div style={{ width: 22, height: 22, borderRadius: "50%", background: "#1a1a18", color: "#fff", fontSize: 11, fontWeight: 600, display: "inline-flex", alignItems: "center", justifyContent: "center", marginRight: 8, flexShrink: 0 }}>{i+1}</div>
                <span style={{ fontSize: 13, fontWeight: 600 }}>{STEP_LABELS[key]}</span>
                <span style={{ fontSize: 11, color: "#9b9b96", marginLeft: "auto" }}>{STEP_HINTS[key]}</span>
              </div>
              {["A","B"].map(who => (
                <div key={who} style={{ marginBottom: 10 }}>
                  <span style={c.aTag(who)}>{who}</span>
                  <textarea rows={2} style={{ ...c.inp, marginBottom: 0 }} value={(script.steps[key]&&script.steps[key][who])||""} onChange={e => updateLine(key,who,e.target.value)} />
                </div>
              ))}
            </div>
          ))}
          <div style={c.bgrp}>
            <button style={{ ...c.bp, opacity: sending ? 0.5 : 1 }} onClick={sendToHeygen} disabled={sending}>
              {sending ? "送信中..." : "HeyGenに送信する →"}
            </button>
            <button style={c.bo} onClick={() => { setScript(null); setStep(1); }}>← テーマを選び直す</button>
          </div>
          {sendErr && <div style={c.err}>{sendErr}</div>}
        </div>
      )}

      {step === 3 && result && (
        <div style={c.card}>
          <p style={{ fontSize: 16, fontWeight: 600, marginBottom: 12 }}>HeyGenに送信完了</p>
          <div style={c.irow}><span style={{ color: "#888" }}>動画ID</span><span style={{ fontFamily: "monospace", fontSize: 12, fontWeight: 500 }}>{result.videoId||"—"}</span></div>
          <div style={{ ...c.irow, borderBottom: "none" }}><span style={{ color: "#888" }}>使用アバター</span><span style={{ fontWeight: 500, fontSize: 13 }}>{result.avatarName}</span></div>
          <p style={{ fontSize: 12, color: "#9b9b96", marginTop: 12, lineHeight: 1.6 }}>テストモードで送信しました。HeyGenダッシュボードで確認してください。</p>
          <div style={c.bgrp}>
            <button style={c.bp} onClick={resetAll}>次の動画を作る →</button>
            <a href="https://app.heygen.com/videos" target="_blank" rel="noopener noreferrer" style={{ ...c.bo, textDecoration: "none", display: "inline-flex", alignItems: "center" }}>HeyGenで確認 ↗</a>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
